# Prometheus configuration for the Lagda observability stack.
# Scrapes the application monolith (apps/server :3000) and the auth
# service (apps/auth :3100), both of which expose RED + domain metrics
# at /metrics via prom-client (lagda-conventions §9).
#
# During local dev the services run on the host, so we scrape them via
# `host.docker.internal`. In the full containerised stack, point these
# at the service container names instead (see the commented targets).

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: lagda

# Alert rules are evaluated by Prometheus; Grafana Alerting can also
# consume these same metrics (see grafana/provisioning/alerting).
rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: lagda-server
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          # Local dev: host-run app monolith on :3000.
          - host.docker.internal:3000
          # Full stack: replace the line above with the container name.
          # - server:3000
        labels:
          service: lagda-server

  - job_name: lagda-auth
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          # Local dev: host-run auth service on :3100.
          - host.docker.internal:3100
          # Full stack: replace the line above with the container name.
          # - auth:3100
        labels:
          service: lagda-auth
