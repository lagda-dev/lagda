# Grafana dashboard provider (lagda-conventions §9).
# Loads every JSON dashboard from the mounted dashboards directory.

apiVersion: 1

providers:
  - name: lagda
    orgId: 1
    folder: Lagda
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
