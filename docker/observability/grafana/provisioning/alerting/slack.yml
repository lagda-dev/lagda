# Grafana Alerting: Slack contact point + notification policy (§9, §10).
# Errors and alerts are handled in Grafana (no external error-tracking SaaS).
# The webhook URL is injected from the SLACK_ALERT_WEBHOOK_URL env var —
# never commit a real webhook (lagda-conventions §8).

apiVersion: 1

contactPoints:
  - orgId: 1
    name: slack-alerts
    receivers:
      - uid: slack-alerts-receiver
        type: slack
        settings:
          url: ${SLACK_ALERT_WEBHOOK_URL}
          title: "[{{ .Status | toUpper }}] Lagda alert"
          text: >-
            {{ range .Alerts }}*{{ .Labels.alertname }}* on
            {{ .Labels.service }}{{ .Labels.queue }}
            — {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false

policies:
  - orgId: 1
    receiver: slack-alerts
    group_by:
      - alertname
      - service
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
